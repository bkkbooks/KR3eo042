body:
  text: 五穀食忌晚米合蒼耳食令人卒心痛或成走注合馬肉發痼疾陳倉米和馬肉食發痼疾和蒼耳食卒心痛粟米合杏仁食令人吐瀉蕎麥合豬肉食患熱風大黑豆合豬肉食令人悶青豆忌與鯉魚同食赤小豆合魚鮓食令人消渴五味食忌醋忌與蛤肉同食餕糖忌與菖蒲根同食菖蒲根忌與羊肉同食蔗糖同鯽魚食成疳蟲同葵菜食生流癖同筍食不消成癥荊芥忌與黃顙魚食蒔蘿忌與阿魏食小麥醬同鯽魚食咽喉生瘡五果食忌芡實合蜜食生蟲橘同螃蟹食患軟癰橙同檳榔食發頭風噁心桃同鱉肉食心氣痛椑柿同蟹食令人腹痛大瀉芋頭同鯉魚鯽魚食令人虛勞無力李同蜜食損五臟同雀肉食發痰瘧榧同鵝肉食生叚節風棗同生蔥蜜食五臟不和同白魚食患腰痛枇杷和炙肉熱麵食患熱毒發黃西瓜同油餅食損胃稍瓜忌與牛乳酪煎鮓同食五菜食忌芥菜同兔肉食生積同鯽魚食水腫蔥忌與菘菜及蜜同食服常山藥人忌食韭忌與蜜食薤合牛肉食成瘕疾苦蕒蠶婦忌食莧菜忌與鱉肉食令生鱉瘕白苣合酪乳蜜食令人生蟲產婦食之小腹痛薺菜合面食令人背悶紫蘇合青魚鮓食令人腸內生瘡成疝氣菠菱合蛆魚食發霍亂菰根忌同蜜食服巴豆藥人忌食苦筍同羊肝食患青盲青蒿同葫荽食氣臭六畜食忌黃牛肉合豬肉桑柴炙食生寸白蟲羚羊肉合鮓食傷人心合蕎麥麵食患大瘋疫病瘧病後食之發熱致死羊肝與生椒同食傷五臟同苦筍食患青盲馬肉與蒼耳生薑同食令人氣嗽與陳倉米同食必得卒患豚肉合生葫荽食爛人臍合葵菜食令人少氣合生姜食令人患瘋羊肝黃豆同食令人心悶豬肝合魚鮓食發癰疽同鯉魚子食傷人神豬肺忌與白花菜合食犬肉炙食恐成消渴同菱米食令人生瘑癩鹿肉合蒲作羹發瘡令人患發背忌與雉肉同食驢肉同荸薺食患筋急兔肉合白雞食令人發黃合獺肉食病遁屍同乾薑食成霍亂同胡桃食患背瘡合芥菜食成積麋肉合雉肉生菜梅李之屬食發病諸禽食忌丹雄雞合葫荽蒜薤食氣滯合牛肉汁食患心瘕瘧病後忌食白雄雞合獺肉食作鬼疰不能治雞卵同蔥蒜食令人氣促生瘡同鱉食患異病韭子同食患叚節瘋鴨卵合鱉肉食令人短氣野雞木耳胡桃豆豉不可同食鷓鴣與竹筍食令人小腹脹雉雞與胡桃菌蕈木耳同食發痔下血和蕎麥食生寸白蟲同家雞子食成遁屍山雞同蕎麥麵食生肥蟲雀肉忌與李子同食鶉同豬肉食令人生黑子和菌蕈食令人發痔蟲魚食忌蜂蜜同生蔥食殺人青赤酸者食心煩魚鮓忌與小豆藿食鮧魚鱯魚同野豬肉食令人吐瀉鮠魚同野豬雞食令人患癩動痼疾鱔魚魷魚忌與白犬血食鯽魚合芥菜食令人水腫魚子忌合豬猴等肉食鰻鱺合銀杏食患軟風鱸魚合乳酪食發痃癬瘡腫鯖魚忌與蒜葫荽生葵麥醬同食白魚合棗子食患腰痛黃魚合蕎麥食令人失音鱘魚忌合干筍食蚌螺同芥菜食令人心氣痛車螯同榲桲食患大疝鱉肉合莧菜蕨食令人生鱉瘕同馬肉食令人心氣痛同芥菜食生惡瘕蟹合紅柿食令人吐血後生膈氣病鯉魚鮓同青豆藿食令人消渴蜜瓶盛鮓殺人鮓內有蝦不可食鯖魚鮓忌與葫荽葵麥醬食又恐同羊肉食傷心孕婦食忌食羊肝令子多厄食兔肉令子缺唇食雀腦令子雀目食茨菰能消胎氣食山羊肉子多病食蛙令子壽夭食麋脂及梅李令子青盲食子姜令子多指生瘡食乾魚令子多疾食雀肉飲酒令子無恥多淫食犬肉令子無聲懷娠亦不良食蝦蟆鰍鱔令子聲啞食鶩鴨及螃蟹令子橫生食漿水粥令子骨疲不成人食漿水絕產食驢螺馬肉過月難產食鱉令子項短及損胎豆醬合藿同食墮胎食醬面多黑點食鱔魚合田雞令子瘖啞食暴鴨令子患諸蟲糯米與雜肉同食令子生寸白蟲菌有大毒食之令子成瘋鱗魚與蒜食毒胎雀肉合豆醬食令子面生點點黑子雞魚與粳米同食令子生寸白蟲鯉魚與雞子同食令子成疳多瘡鴨子與桑椹同食令子倒生乳母食忌食寒涼發病之物子有積熱驚風瘍食濕熱動風之物子有疥癬瘡病食魚蝦雞馬肉子有癬疳瘦疾小兒食忌雞鴨卵魚子之類兒食長而多忘食雞肉生蟲栗子飼之齒生遲腎氣弱食王瓜生疳蟲黍米飯並蕨食之腳無力食蕎麥主今發落蕺菜食之三歲不行就瓢並瓶飲水語言多吶羊肝同椒食損五臟食鱘魚結癥瘕及咳嗽幼女食魚魨則拙逐月食忌附永當戒食正月戒食虎豹貍肉令人傷神勿食生蓼令人傷腎二月戒食兔傷神且孕婦食之主子唇缺戒食雞子忌心初九日勿食魚仙家大忌三月勿食鳥獸五臟百草仙家大忌庚寅日食魚大凶四月勿食雉令人氣逆勿食鱔魚勿食蒜傷氣傷神五月勿食桑濃勿食煮餅凡君子此月當齋戒節嗜欲薄滋味為緊要慎之六月勿食生葵宿疾尤忌澤水令人病鱉癥七月勿食蓴是月蠟蟲著上人不見勿食蜜令人霍亂八月勿食姜蒜令人損壽減智勿食雞子令人傷神九月蟹腹有真稻芒長寸向冬輸與東海神若未輸芒便不可食十月勿食豬肉令人發宿疾勿食椒令人損神十一月勿食龜鱉令人水病勿食陳脯令人噁心戒食鴛鴦不致噁心十二月勿食生葵發痼疾勿食薤則傷人勿食鱔勿食鱉必致害人永當戒食病豬死禽不正之物若不禁之為害則大又永戒食牛肉此太牢之牲不食可也若患楊梅惡瘡食之則發若痔漏服藥痊瘥一食牛肉驢馬肉燒酒芥辣縮砂官桂生蘿蔔發之復難治諸果有毒桃杏仁雙者五月食未成核果令人發癰癤及寒熱秋冬果落地食之令人患漏症諸獸有毒自死疫死者犬馬懸蹄肉肉落水浮者諸獸足赤者皆不可食諸禽有毒白色玄首者玄色白首者卵有八字者自死無傷者鴨目色白者禽有大爪者死不伸足者死不閉目者皆不可食諸魚有毒目能開合者腦白連珠者逆鱗逆鰓者二目不同者腹下丹字者有角白背者目鱗須赤者皆有毒殺人無鰓白鬣者連鱗黑點者無膽全鰓者皆不可食飲食害人銀魚不可與麥門冬同食殺人盛蜜瓶作鮓食之殺人凡肉炙不動暴不幹食並殺人菌下無紋者食之殺人肉納在蜜器氣大泄者皆殺人新菌有毛者食之殺人檐滴水生菜有毒食之殺人禽獸肝青者食之殺人凡鳥獸自死口不閉者食之殺人蟹目相向者食之殺人頭髮不可在魚鮓內食之殺人祭酒自耗者食之殺人魚頭有白連背上者食之殺人河豚眼赤者食之殺人祭神肉無故自動者食之殺人羊肝有竅者食之害人生果停久有損處者食之害人瓜有兩蒂兩鼻者食之害人鱟魚小者謂之鬼鱟食之害人曝肉脯不幹者食之害人飲酒後不得食羊豕腦食之大害人食黃鱔後食荊芥者則殺人飲食相反螃蟹與灰酒相食令久吐血食粟米勿食杏仁令人吐瀉薤菜與牛肉同食令人生瘣食兔肉勿食姜干令人霍亂兔肉與白雞同食令人發黃食死馬勿食倉米發人百病𩶾魚與芥菜同食令人黃腫食豬肉勿食生薑令人大風雞肉與胡蒜同食令人氣滯糖蜜與小蝦同食令人暴下食羊肝勿使生椒傷人五臟棗李與蜂蜜同食五臟不和飲酒後勿食芥辣緩人筋骨兔肉與鴨肉同食血氣不行飲酒後勿食胡桃令人嘔血豬肉與鵪鶉同食面生黑點食粥後勿食白湯令人成淋牛肉與白酒同食生寸白蟲諸禽獸魚油點燈炬令人盲眼附急救良方急救六畜中毒以水服壁上黃土或地漿解之食牛肉中毒以豬牙燒灰為末水調服二錢即愈食馬肉中毒飲好酒微醉即愈食狗肉中毒用杏仁二兩和皮研細以熱湯三盞拌勻分三服其狗肉皆全片瀉出即愈食豬肉中毒以燒豬糞為末水調服二三錢不過三服即瘥急救食諸魚毒用橘皮汁大豆汁馬鞭草汁紫蘇汁俱可解之急救食諸蕈毒掘地坑汲井水在內攪之連飲泥水數碗取吐即瘥急救中巴豆毒其症口渴臉赤五心煩熱利不止搗芭蕉根葉汁飲之即瘥急救天行熱病鬼臼一錢真者鬼箭羽一錢硃砂一錢雄黃一錢石菖蒲五分上煉蜜丸如大豆大每日米飲下二丸若與病人同床共衣將二丸塞鼻不染急救夏途熱死切不可以冷水灌及以冷物逼心急移陰涼處取路上熱土於死人臍上作窩令人尿其中又取路上熱土並蒜同研水調去渣灌下即活急救冬途凍死及落水凍死微有氣者急脫去濕衣解生人熱衣包之用炒灰令熱以囊熨之心上冷即換之令暖氣通里以熱酒或薑湯灌之即活急救中砒霜毒用好白蠟三五錢擂細冷水灌下解之急救男婦縊死口閉捏拳者可救口開手散者不救頭莫放倒刺雞冠血滴入口中即活男用雌女用雄仍塗喉下更效急救木石壓死並跌磕傷從高墜下跌死氣絕不能言者服藥不便急擘開口以熱小便灌之立效又方用松節炒出煙入好生酒攙內儘量飲極佳
